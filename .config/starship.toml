"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 100
add_newline = true

[aws]
symbol = " "
style = "bold fg:#FCA17D"
#style = "bold fg:209"

[directory]
read_only = " 󰌾"
#style = "bold fg:69"
style = "bold fg:#DA627D"
truncate_to_repo = true
truncation_length = 3
fish_style_pwd_dir_length = 1 # Turns /home/user/projects/web into ~/u/p/web

[git_branch]
symbol = " "
style = "bold fg:#6bd897"

[kubernetes]
disabled = false
style = "bold fg:#2596be"
#style = "bold fg:#9A348E"

[time]
disabled = true
time_format = '%H:%M:%S'  

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
modified = "!"
untracked = "?"
stashed = "$"

[status]
disabled = false
#symbol = "❌ "
symbol = " "
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '

[git_metrics]
added_style = "bold blue"
deleted_style = "bold red"
disabled = false # off by default

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"
